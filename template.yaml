AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Meetup Management Platform - Serverless infrastructure

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs22.x
    MemorySize: 256
    Environment:
      Variables:
        EVENTS_TABLE: !Ref EventsTable
        USERS_TABLE: !Ref UsersTable
        SCHEDULED_POSTS_TABLE: !Ref ScheduledPostsTable
        MESSAGES_TABLE: !Ref MessagesTable
        NOTIFICATIONS_TABLE: !Ref NotificationsTable
        SYNC_RECORDS_TABLE: !Ref SyncRecordsTable
        SYNC_CONFLICTS_TABLE: !Ref SyncConflictsTable
        USER_POOL_ID: !Ref UserPool
        USER_POOL_CLIENT_ID: !Ref UserPoolClient
        SCHEDULER_QUEUE_URL: !Ref SchedulerQueue
        REGION: !Ref AWS::Region

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name

Resources:
  # Cognito User Pool
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-user-pool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub ${AWS::StackName}-client
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  # DynamoDB Tables
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: dateTime
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserEventsIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: dateTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ScheduledPostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-scheduled-posts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: postId
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: scheduledTime
          AttributeType: S
      KeySchema:
        - AttributeName: postId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EventPostsIndex
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: scheduledTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  MessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-messages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: messageId
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: scheduledTime
          AttributeType: S
      KeySchema:
        - AttributeName: messageId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EventMessagesIndex
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: scheduledTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-notifications
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: notificationId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: notificationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserNotificationsIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SyncRecordsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-sync-records
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: syncId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: lastSyncTime
          AttributeType: S
      KeySchema:
        - AttributeName: syncId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserSyncIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: lastSyncTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SyncConflictsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-sync-conflicts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: conflictId
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: conflictId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EventConflictsIndex
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # SQS Queue for scheduling
  SchedulerQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-scheduler-queue
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600  # 14 days

  # EventBridge Rule for periodic sync
  SyncScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${AWS::StackName}-sync-schedule
      Description: Periodic synchronization with external platforms
      ScheduleExpression: rate(15 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt SyncFunction.Arn
          Id: SyncFunctionTarget

  # EventBridge Rule for checking scheduled posts
  PostScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${AWS::StackName}-post-schedule
      Description: Check for scheduled posts ready for execution
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt SchedulerFunction.Arn
          Id: SchedulerFunctionTarget
          Input: !Sub |
            {
              "source": "logimeet.scheduler",
              "detail-type": "Check Scheduled Posts",
              "detail": {}
            }

  # Lambda Functions
  AuthFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - handlers/auth.ts
    Properties:
      FunctionName: !Sub ${AWS::StackName}-auth
      CodeUri: src/
      Handler: handlers/auth.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        GetProfile:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /auth/profile
            Method: get
        UpdateProfile:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /auth/profile
            Method: put
        Logout:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /auth/logout
            Method: post

  EventsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - handlers/events.ts
    Properties:
      FunctionName: !Sub ${AWS::StackName}-events
      CodeUri: src/
      Handler: handlers/events.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt SchedulerQueue.QueueName
      Events:
        CreateEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /events
            Method: post
        GetEvents:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /events
            Method: get
        GetEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /events/{id}
            Method: get
        UpdateEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /events/{id}
            Method: put
        DeleteEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /events/{id}
            Method: delete
        ConfirmEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /events/{id}/confirm
            Method: post
        RejectEvent:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /events/{id}/reject
            Method: post

  SocialFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - handlers/social.ts
    Properties:
      FunctionName: !Sub ${AWS::StackName}-social
      CodeUri: src/
      Handler: handlers/social.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ScheduledPostsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt SchedulerQueue.QueueName
      Events:
        SchedulePosts:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /social/schedule
            Method: post
        GetPosts:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /social/posts
            Method: get
        CancelPost:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /social/posts/{id}
            Method: delete

  MessagingFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - handlers/messaging.ts
    Properties:
      FunctionName: !Sub ${AWS::StackName}-messaging
      CodeUri: src/
      Handler: handlers/messaging.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt SchedulerQueue.QueueName
      Events:
        ScheduleMessage:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /messages/schedule
            Method: post
        GetMessages:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /messages
            Method: get
        GetTemplates:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /messages/templates
            Method: get
        UpdateTemplates:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /messages/templates
            Method: put
        DeleteMessage:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /messages/{id}
            Method: delete

  NotificationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - handlers/notifications.ts
    Properties:
      FunctionName: !Sub ${AWS::StackName}-notifications
      CodeUri: src/
      Handler: handlers/notifications.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        GetNotifications:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /notifications
            Method: get
        UpdatePreferences:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /notifications/preferences
            Method: put
        GetPreferences:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /notifications/preferences
            Method: get
        MarkRead:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /notifications/{id}/read
            Method: put

  SyncFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - handlers/sync.ts
    Properties:
      FunctionName: !Sub ${AWS::StackName}-sync
      CodeUri: src/
      Handler: handlers/sync.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SyncRecordsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SyncConflictsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        TriggerSync:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /events/sync
            Method: post
        GetSyncStatus:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /sync/status
            Method: get
        ResolveConflict:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /sync/resolve-conflict
            Method: post

  SchedulerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        EntryPoints:
          - handlers/scheduler.ts
    Properties:
      FunctionName: !Sub ${AWS::StackName}-scheduler
      CodeUri: src/
      Handler: handlers/scheduler.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ScheduledPostsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagesTable
        - SQSPollerPolicy:
            QueueName: !GetAtt SchedulerQueue.QueueName
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt SchedulerQueue.Arn
            BatchSize: 10

  # CloudWatch Log Group for API Gateway
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${AWS::StackName}-api
      RetentionInDays: 14

  # IAM Role for API Gateway to write to CloudWatch
  ApiGatewayLoggingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # API Gateway Account configuration for logging
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayLoggingRole.Arn

  # API Gateway
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api
      StageName: !Ref Environment
      # Enable execution logging
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
      # Enable access logging
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: '{"requestId":"$context.requestId","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","error.message":"$context.error.message","error.messageString":"$context.error.messageString","authorizer.error":"$context.authorizer.error","authorizer.status":"$context.authorizer.status","integration.error":"$context.integration.error","integration.status":"$context.integration.status","responseLength":"$context.responseLength","responseTime":"$context.responseTime","sourceIp":"$context.identity.sourceIp","userAgent":"$context.identity.userAgent"}'
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,Access-Control-Allow-Origin'"
        AllowOrigin: "'*'"
        AllowCredentials: false
        MaxAge: "'600'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn

  # Lambda Permissions for EventBridge
  SyncFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SyncFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SyncScheduleRule.Arn

  PostScheduleFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SchedulerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PostScheduleRule.Arn

Outputs:
  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-api-url

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub ${AWS::StackName}-user-pool-id

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-user-pool-client-id

  EventsTableName:
    Description: Events DynamoDB table name
    Value: !Ref EventsTable
    Export:
      Name: !Sub ${AWS::StackName}-events-table